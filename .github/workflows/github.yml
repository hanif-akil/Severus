name: Build and Release APK

on:
  push:
    branches: [ master, main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.6.0'

      - name: Build Debug APK
        run: gradle :app:assembleDebug --stacktrace 2>&1 | tee build-output.txt
        continue-on-error: true

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build-output.txt

      - name: Rename APK
        run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/Severus.apk

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Severus-debug
          path: app/build/outputs/apk/debug/Severus.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/Severus.apk
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
